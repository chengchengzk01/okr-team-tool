name: render-health-prewarm

on:
  workflow_dispatch:
  schedule:
    - cron: "50 0 * * 1-5"
    - cron: "50 8 * * 1-5"

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Validate health check URL
        env:
          HEALTHCHECK_URL: ${{ secrets.RENDER_APP_HEALTHCHECK_URL }}
        run: |
          if [ -z "$HEALTHCHECK_URL" ]; then
            echo "Missing secret: RENDER_APP_HEALTHCHECK_URL"
            exit 1
          fi

      - name: Warm up application
        env:
          HEALTHCHECK_URL: ${{ secrets.RENDER_APP_HEALTHCHECK_URL }}
        run: |
          curl --fail --show-error --silent --location "$HEALTHCHECK_URL"
